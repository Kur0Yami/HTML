// ═══════════════════════════════════════════════════════
// TYPO DETECTOR
// ═══════════════════════════════════════════════════════

const TypoFinder = {
  typos: {
    'drewable': { fix: 'drawable', severity: 'critical' },
    'drawble': { fix: 'drawable', severity: 'critical' },
    'ist_item': { fix: 'list_item', severity: 'critical' },
    'embeded': { fix: 'embedded', severity: 'high' },
    'appcomat': { fix: 'appcompat', severity: 'high' },
    'prefrence': { fix: 'preference', severity: 'high' },
  },

  detect(text) {
    const found = [];
    const regex = /<drawable\s+name="([^"]+)"/g;
    let match;
    while ((match = regex.exec(text)) !== null) {
      const name = match[1];
      for (const [typo, data] of Object.entries(this.typos)) {
        if (name.includes(typo)) {
          found.push({ typo, fix: data.fix, severity: data.severity, name });
        }
      }
    }
    return found;
  },

  fixAll(text) {
    let result = text;
    for (const [typo, data] of Object.entries(this.typos)) {
      const regex = new RegExp(`(name=")([^"]*${typo}[^"]*)("`, 'gi');
      result = result.replace(regex, (m, p1, p2, p3) => {
        return p1 + p2.replace(new RegExp(typo, 'gi'), data.fix) + p3;
      });
    }
    return result;
  }
};

// ═══════════════════════════════════════════════════════
// XML PARSER
// ═══════════════════════════════════════════════════════

function parseXML(xml) {
  const entries = [];
  const regex = /<drawable\s+([^>]+)>([^<]*)<\/drawable>/gs;
  let match;
  while ((match = regex.exec(xml)) !== null) {
    const attrs = match[1];
    const content = match[2].trim();
    const nameMatch = attrs.match(/name="([^"]+)"/);
    const pkgMatch = attrs.match(/package="([^"]+)"/);
    if (nameMatch) {
      entries.push({
        name: nameMatch[1],
        package: pkgMatch ? pkgMatch[1] : '',
        target: content
      });
    }
  }
  return entries;
}

// ═══════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  toast('✅ Copied!');
}

function downloadText(text, filename) {
  const blob = new Blob([text], { type: 'application/xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  toast(`✅ ${filename} downloaded`);
}

// ═══════════════════════════════════════════════════════
// INIT & FUNCTIONS
// ═══════════════════════════════════════════════════════

let currentTab = 'analyzer';
let builderEntries = [];

function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
}

function initTabs() {
  const container = document.getElementById('tabContainer');
  const buttons = document.getElementById('tabButtons');

  for (const [key, tab] of Object.entries(tabs)) {
    const btn = document.createElement('button');
    btn.className = `tab ${key === 'analyzer' ? 'active' : ''}`;
    btn.textContent = tab.name;
    btn.setAttribute('data-tab', key);
    btn.onclick = () => switchTab(key);
    buttons.appendChild(btn);

    const panel = document.createElement('div');
    panel.className = `panel ${key === 'analyzer' ? 'active' : ''}`;
    panel.id = `panel-${key}`;
    panel.innerHTML = tab.html;
    container.appendChild(panel);
  }
}

function loadSample() {
  document.getElementById('analyzerInput').value = `<?xml version='1.0' encoding='utf-8' standalone='yes' ?>

  <drawable name="drewable_bg.9.png" package="miui">window_bg.9.png</drawable>
  <drawable name="ist_item_bg.9.png">preference_item_bg.9.png</drawable>
  <drawable name="ist_item_bg.9.png">preference_item_bg.9.png</drawable>
</MIUI_Theme_Values>`;
  toast('Sample loaded');
}

function runAnalyzer() {
  const xml = document.getElementById('analyzerInput').value;
  if (!xml) { toast('⚠️ Paste XML'); return; }

  const entries = parseXML(xml);
  const typos = TypoFinder.detect(xml);
  const nameCount = {};
  entries.forEach(e => { nameCount[e.name] = (nameCount[e.name] || 0) + 1; });
  const dups = Object.values(nameCount).filter(c => c > 1).length;

  document.getElementById('st-total').textContent = entries.length;
  document.getElementById('st-unique').textContent = Object.keys(nameCount).length;
  document.getElementById('st-dup').textContent = dups;
  document.getElementById('st-typo').textContent = typos.length;
  document.getElementById('analyzerStats').style.display = 'block';

  let issues = '<div class="issue ok">✅ Analysis complete</div>';
  if (xml.includes('standalone')) issues = '<div class="issue error">🔴 Remove standalone</div>' + issues;
  if (dups > 0) issues = `<div class="issue error">🔴 ${dups} duplicates found</div>` + issues;
  if (typos.length > 0) issues = `<div class="issue warn">✏️ ${typos.length} typos found</div>` + issues;

  document.getElementById('analyzerIssues').innerHTML = issues;

  const table = `<table><thead><tr><th>#</th><th>Name</th><th>Target</th><th>Status</th></tr></thead><tbody>
    ${entries.map((e, i) => `<tr>
      <td>${i+1}</td>
      <td><code style="color:var(--accent3)">${e.name}</code></td>
      <td>${e.target}</td>
      <td>${nameCount[e.name] > 1 ? '<span class="pill">DUP</span>' : 'OK'}</td>
    </tr>`).join('')}
  </tbody></table>`;
  document.getElementById('analyzerTable').innerHTML = table;

  toast('✅ Analysis done');
}

function runAutoFix() {
  let xml = document.getElementById('autofixInput').value;
  if (!xml) { toast('⚠️ Paste XML'); return; }

  let logs = '';
  let count = 0;

  if (document.getElementById('fixStandalone').checked && xml.includes('standalone')) {
    xml = xml.replace(/\s+standalone=['"][^'"]*['"]/g, '');
    logs += '<div class="issue ok">✅ Removed standalone</div>';
    count++;
  }

  if (document.getElementById('fixEncoding').checked && xml.includes('UTF8')) {
    xml = xml.replace(/UTF8/g, 'utf-8');
    logs += '<div class="issue ok">✅ Fixed encoding</div>';
    count++;
  }

  if (document.getElementById('fixDup').checked) {
    const seen = new Set();
    const lines = xml.split('\n');
    const cleaned = lines.filter(l => {
      const m = l.match(/name="([^"]+)"/);
      if (!m) return true;
      if (seen.has(m[1])) return false;
      seen.add(m[1]);
      return true;
    });
    if (cleaned.length < lines.length) {
      xml = cleaned.join('\n');
      logs += '<div class="issue ok">✅ Removed duplicates</div>';
      count++;
    }
  }

  if (document.getElementById('fixEmpty').checked) {
    const before = xml;
    xml = xml.replace(/\n{3,}/g, '\n\n');
    if (xml !== before) {
      logs += '<div class="issue ok">✅ Cleaned blank lines</div>';
      count++;
    }
  }

  document.getElementById('autofixOutput').value = xml;
  document.getElementById('fixLog').innerHTML = logs || '<div class="empty-state">No fixes</div>';
  toast(`✅ ${count} fixes applied`);
}

function runTypoDetection() {
  const xml = document.getElementById('typoInput').value;
  if (!xml) { toast('⚠️ Paste XML'); return; }

  const typos = TypoFinder.detect(xml);
  if (typos.length === 0) {
    document.getElementById('typoList').innerHTML = '<div class="empty-state">No typos found</div>';
    return;
  }

  const unique = [...new Set(typos.map(t => t.typo))];
  const html = unique.map(t => {
    const data = typos.find(x => x.typo === t);
    return `<div class="issue warn">✏️ <code>${t}</code> → <code>${data.fix}</code> (${data.severity})</div>`;
  }).join('');

  document.getElementById('typoList').innerHTML = html + '<button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="applyTypoFix()">✅ Fix All</button>';
  toast(`Found ${typos.length} typos`);
}

function applyTypoFix() {
  const xml = document.getElementById('typoInput').value;
  const fixed = TypoFinder.fixAll(xml);
  document.getElementById('typoOutput').value = fixed;
  toast('✅ Fixed!');
}

function runRename() {
  const xml = document.getElementById('renameInput').value;
  const old = document.getElementById('renameOld').value;
  const neu = document.getElementById('renameNew').value;
  if (!xml || !old || !neu) { toast('⚠️ Fill all'); return; }

  const escaped = old.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const regex = new RegExp(`(>\\s*)${escaped}(\\s*<)`, 'g');
  const count = (xml.match(regex) || []).length;

  if (count === 0) {
    document.getElementById('renameCount').textContent = `⚠️ Not found`;
    return;
  }

  const result = xml.replace(regex, `$1${neu}$2`);
  document.getElementById('renameOutput').value = result;
  document.getElementById('renameCount').textContent = `✅ ${count} renamed`;
  toast(`✅ ${count} entries renamed`);
}

function clearRenameTab() {
  document.getElementById('renameInput').value = '';
  document.getElementById('renameOld').value = '';
  document.getElementById('renameNew').value = '';
  document.getElementById('renameOutput').value = '';
  document.getElementById('renameCount').textContent = '';
}

function generateDiff() {
  const orig = document.getElementById('diffOriginal').value;
  const mod = document.getElementById('diffModified').value;
  if (!orig || !mod) { toast('⚠️ Fill both'); return; }

  const origLines = orig.split('\n');
  const modLines = mod.split('\n');
  let html = '';

  for (let i = 0; i < Math.max(origLines.length, modLines.length); i++) {
    const o = origLines[i] || '';
    const m = modLines[i] || '';

    if (o === m) {
      html += `<div style="padding:4px;color:var(--text-dim)">${o}</div>`;
    } else {
      if (o) html += `<div style="padding:4px;background:rgba(255,77,106,0.15);color:var(--error)">- ${o}</div>`;
      if (m) html += `<div style="padding:4px;background:rgba(77,255,176,0.15);color:var(--ok)">+ ${m}</div>`;
    }
  }

  document.getElementById('diffOutput').innerHTML = html;
  toast('✅ Diff generated');
}

function updateBuilderPreview() {
  const name = document.getElementById('builderName').value;
  const target = document.getElementById('builderTarget').value;
  const pkg = document.getElementById('builderPackage').value;

  if (!name) { document.getElementById('builderPreview').value = ''; return; }

  const pkgAttr = pkg ? ` package="${pkg}"` : '';
  document.getElementById('builderPreview').value = `<drawable name="${name}"${pkgAttr}>${target}</drawable>`;
}

function addBuilderEntry() {
  const name = document.getElementById('builderName').value.trim();
  const target = document.getElementById('builderTarget').value.trim();
  const pkg = document.getElementById('builderPackage').value.trim();

  if (!name || !target) { toast('⚠️ Fill name and target'); return; }

  builderEntries.push({ name, target, pkg });
  updateBuilderList();
  clearBuilderForm();
  toast('✅ Added');
}

function clearBuilderForm() {
  document.getElementById('builderName').value = '';
  document.getElementById('builderTarget').value = '';
  document.getElementById('builderPackage').value = '';
  document.getElementById('builderPreview').value = '';
}

function clearBuilderList() {
  builderEntries = [];
  updateBuilderList();
}

function removeBuilderItem(idx) {
  builderEntries.splice(idx, 1);
  updateBuilderList();
}

function updateBuilderList() {
  const list = document.getElementById('builderList');
  if (builderEntries.length === 0) {
    list.innerHTML = '<div class="empty-state">No entries</div>';
    document.getElementById('builderOutput').value = '';
    return;
  }

  list.innerHTML = builderEntries.map((e, i) => `<div style="padding:8px;background:var(--surface2);border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
    <div style="font-size:11px"><code>${e.name}</code> ${e.pkg ? `<span style="background:rgba(124,106,255,0.15);padding:2px 6px;border-radius:4px">${e.pkg}</span>` : ''} → ${e.target}</div>
    <button class="btn btn-danger" onclick="removeBuilderItem(${i})">✕</button>
  </div>`).join('');

  const xml = `<?xml version='1.0' encoding='utf-8' ?>
<MIUI_Theme_Values>

${builderEntries.map(e => {
    const pkgAttr = e.pkg ? ` package="${e.pkg}"` : '';
    return `  <drawable name="${e.name}"${pkgAttr}>${e.target}</drawable>`;
  }).join('\n')}

</MIUI_Theme_Values>`;

  document.getElementById('builderOutput').value = xml;
}

// START
initTabs();
</script>

</body>
</html>
